<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Đổi mật khẩu</title>

<link rel="stylesheet" href="/change-password.css">

</head>

<body>

<div class="box">

<h2>Đổi mật khẩu</h2>

<form id="changeForm">

<input type="text" name="username" placeholder="Tên đăng nhập" required>

<input type="password" name="oldPassword" placeholder="Mật khẩu cũ" required>

<input type="password" name="newPassword" placeholder="Mật khẩu mới" required>

<input type="password" name="confirmPassword" placeholder="Xác nhận mật khẩu" required>

<button type="submit">Đổi mật khẩu</button>

</form>

<p id="msg"></p>

<a href="/login.html">Quay lại đăng nhập</a>

</div>



</body>
<script>

const form = document.getElementById("changeForm")
const msg = document.getElementById("msg")

form.addEventListener("submit", async function(e){

e.preventDefault()   // chặn reload trang

const username = form.username.value
const oldPassword = form.oldPassword.value
const newPassword = form.newPassword.value
const confirmPassword = form.confirmPassword.value

// check xác nhận mật khẩu
if(newPassword !== confirmPassword){
msg.style.color = "red"
msg.innerText = "Xác nhận mật khẩu không đúng"
return
}

const res = await fetch("/change-password",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username,
oldPassword,
newPassword
})
})

const result = await res.text()

if(result === "Đổi mật khẩu thành công"){
msg.style.color="green"
}else{
msg.style.color="red"
}

msg.innerText=result

})

</script>
</html>
