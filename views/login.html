<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
</head>
<body>

<h2>Dashboard</h2>

<h3>Danh sách tài khoản</h3>

<table border="1">
<thead>
<tr>
<th>ID</th>
<th>Username</th>
<th>Email</th>
<th>Role</th>
</tr>
</thead>

<tbody id="users"></tbody>

</table>

<script>

async function loadUsers(){

    const res = await fetch("http://localhost:3000/api/users");

    const data = await res.json();

    const table = document.getElementById("users");

    data.forEach(u => {

        table.innerHTML += `
        <tr>
            <td>${u.id}</td>
            <td>${u.username}</td>
            <td>${u.email}</td>
            <td>${u.role_id}</td>
        </tr>
        `;

    });

}

loadUsers();

</script>

</body>
</html>
