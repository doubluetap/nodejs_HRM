<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<title>Đăng ký</title>

<link rel="stylesheet" href="/register.css">

</head>

<body>

<div class="register-box">

<h2>Đăng ký tài khoản</h2>

<form id="registerForm">

<div class="input-group">
<input type="text" name="username" placeholder="Tên đăng nhập" required>
</div>

<div class="input-group">
<input type="email" name="email" placeholder="Email" required>
</div>

<div class="input-group">
<input type="password" id="password" name="password" placeholder="Mật khẩu" required>
</div>

<div class="input-group">
<input type="password" id="confirmPassword" name="confirmPassword" placeholder="Xác nhận mật khẩu" required>
</div>

<div class="button-group">

<button type="submit" class="register-btn">Đăng ký</button>

<a href="/login.html">
<button type="button" class="login-btn">Đăng nhập</button>
</a>

</div>

</form>

<div id="message"></div>

</div>


<script>

const form = document.getElementById("registerForm");
const message = document.getElementById("message");

form.addEventListener("submit", async function(e){

e.preventDefault();

const formData = new FormData(form);

const password = document.getElementById("password").value;
const confirmPassword = document.getElementById("confirmPassword").value;

if(password !== confirmPassword){

message.innerHTML = "Mật khẩu xác nhận không khớp";
message.style.color = "red";
return;

}

const response = await fetch("/register",{
method:"POST",
body:new URLSearchParams(formData)
});

const result = await response.text();

if(result === "success"){

message.innerHTML = "Đăng ký thành công";
message.style.color = "green";
form.reset();

}else{

message.innerHTML = result;
message.style.color = "red";

}

});

</script>

</body>
</html>
